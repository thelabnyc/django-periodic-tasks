workflow:
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

default:
  tags:
    - thelab-arm64

stages:
  - test
  - docs
  - release

cache:
  key: "$CI_PROJECT_NAME"
  paths:
    - $HOME/.cache/pip

include:
  - component: gitlab.com/thelabnyc/thelab-ci-components/review@0.9.0
  - component: gitlab.com/thelabnyc/thelab-ci-components/precommit@0.9.0
  - component: gitlab.com/thelabnyc/thelab-ci-components/publish-gitlab-release@0.9.0
  - component: gitlab.com/thelabnyc/thelab-ci-components/publish-to-pypi@0.9.0

test:
  stage: test
  image: "registry.gitlab.com/thelabnyc/python:${IMAGE}"
  variables:
    POSTGRES_DB: postgres
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: ""
    POSTGRES_HOST_AUTH_METHOD: "trust"
  services:
    - postgres:latest@sha256:1a5b3e745bbd82d6deb146505e504da3c2f248cac15e431951b148fbe4f8613a
  script:
    - uv sync --all-extras
    - uv run tox
  coverage: '/^TOTAL.+?(\d+\%)$/'
  parallel:
    matrix:
      - IMAGE: "3.13"
        TOX_SKIP_ENV: "^(?!py313-)"
      - IMAGE: "3.14"
        TOX_SKIP_ENV: "^(?!py314-)"

pages:
  stage: docs
  image: "registry.gitlab.com/thelabnyc/python:3.14@sha256:e8ffa572205957943ce5300c6ffca236b6dae7de2e2959d6f7d758c6b938aabc"
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
  needs:
    - test
  variables:
    DJANGO_SETTINGS_MODULE: sandbox.settings_docgen
  script:
    - uv sync --all-extras
    - uv run mkdocs build --strict
    - rm -rf ./public
    - mv ./build/mkdocs ./public
  artifacts:
    paths:
      - public

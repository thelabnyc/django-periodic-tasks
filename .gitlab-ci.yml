workflow:
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

default:
  tags:
    - thelab-arm64

stages:
  - test
  - docs
  - release

cache:
  key: "$CI_PROJECT_NAME"
  paths:
    - $HOME/.cache/pip

include:
  - component: gitlab.com/thelabnyc/thelab-ci-components/review@0.8.4
  - component: gitlab.com/thelabnyc/thelab-ci-components/precommit@0.8.4
  - component: gitlab.com/thelabnyc/thelab-ci-components/publish-gitlab-release@0.8.4
  - component: gitlab.com/thelabnyc/thelab-ci-components/publish-to-pypi@0.8.4

test:
  stage: test
  image: "registry.gitlab.com/thelabnyc/python:${IMAGE}"
  variables:
    POSTGRES_DB: postgres
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: ""
    POSTGRES_HOST_AUTH_METHOD: "trust"
  services:
    - postgres:latest@sha256:f7ce845ee6873dd84be93c9828fe0d1fab0f9707dc9ac569694657398b290bce
  script:
    - uv sync --all-extras
    - uv run tox
  coverage: '/^TOTAL.+?(\d+\%)$/'
  parallel:
    matrix:
      - IMAGE: "3.13"
        TOX_SKIP_ENV: "^(?!py313-)"
      - IMAGE: "3.14"
        TOX_SKIP_ENV: "^(?!py314-)"

pages:
  stage: docs
  image: "registry.gitlab.com/thelabnyc/python:3.14@sha256:0734df6eb93f45e426d5e308f61fb725d7b61ce04bce4ea572e0d826f9a9b01a"
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"
  needs:
    - test
  variables:
    DJANGO_SETTINGS_MODULE: sandbox.settings_docgen
  script:
    - uv sync --all-extras
    - uv run mkdocs build --strict
    - rm -rf ./public
    - mv ./build/mkdocs ./public
  artifacts:
    paths:
      - public
